<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极拳发源地 · 拳师名录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">太极拳发源地</div>
            <div class="nav-links">
                <a href="index.html" class="active">拳师名录</a>
                <a href="shifu-libingjiang.html">李炳江</a>
            </div>
        </div>
    </nav>

    <!-- 主横幅 -->
    <header class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="hero-badge">太极 · 传承</div>
            <h1>太极拳发源地</h1>
            <p class="hero-subtitle">一方水土养一方拳 · 一方拳师传一方道</p>
            <div class="hero-sep"></div>
        </div>
    </header>

    <!-- 拳师列表 -->
    <section class="masters-section">
        <h2>本埠拳师</h2>
        <div class="masters-grid">
            <a href="shifu-libingjiang.html" class="master-card">
                <div class="card-photo">
                    <div class="card-photo-placeholder">李</div>
                </div>
                <div class="card-info">
                    <h3>李炳江</h3>
                    <span class="card-title">太极拳教练</span>
                    <p>每日习拳，以拳入道。坚持日更短视频，传播太极文化。</p>
                </div>
            </a>
            <div class="master-card card-empty">
                <div class="card-photo">
                    <div class="card-photo-placeholder">?</div>
                </div>
                <div class="card-info">
                    <h3>待入驻</h3>
                    <span class="card-title">——</span>
                    <p>期待下一位拳师...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>太极拳发源地 · 拳师独立展示平台</p>
    </footer>
</body>
</html>
